version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: interviewiq_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: interviewiq_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: interviewiq
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d interviewiq"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
